version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: snapanalyst-postgres
    environment:
      POSTGRES_USER: snapanalyst
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-snapanalyst_dev_password}
      POSTGRES_DB: snapanalyst_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./snapdata:/snapdata:ro  # Mount CSV files read-only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapanalyst"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snapanalyst-network

  # Redis (for Celery task queue)
  redis:
    image: redis:7-alpine
    container_name: snapanalyst-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - snapanalyst-network

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: snapanalyst-api
    environment:
      DATABASE_URL: postgresql://snapanalyst:${DATABASE_PASSWORD:-snapanalyst_dev_password}@postgres:5432/snapanalyst_db
      REDIS_URL: redis://redis:6379/0
      SNAPDATA_PATH: /snapdata
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ../src:/app/src:ro  # Mount source code (read-only)
      - ../snapdata:/snapdata:ro  # Mount CSV files (read-only)
      - ../logs:/app/logs  # Mount logs directory
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snapanalyst-network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (for background data loading)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: snapanalyst-celery-worker
    environment:
      DATABASE_URL: postgresql://snapanalyst:${DATABASE_PASSWORD:-snapanalyst_dev_password}@postgres:5432/snapanalyst_db
      REDIS_URL: redis://redis:6379/0
      SNAPDATA_PATH: /snapdata
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ../src:/app/src:ro
      - ../snapdata:/snapdata:ro
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snapanalyst-network
    command: celery -A src.services.celery_app worker --loglevel=info

  # PgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: snapanalyst-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@snapanalyst.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - snapanalyst-network
    profiles:
      - admin  # Only start with: docker-compose --profile admin up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  snapanalyst-network:
    driver: bridge
